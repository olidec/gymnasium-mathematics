project:
  type: default
  output-dir: _output
  render:
    - "topics/**/*.qmd"

execute:
  echo: false

# No shared format settings here — each .qmd file is fully self-contained.
# Filters and styles are declared inside each topic's .qmd front matter.
#
# Rendering:
#   quarto render                                  # entire curriculum
#   quarto render topics/01-algebra/               # one topic
#   quarto render topics/01-algebra/lecture.qmd    # one file
