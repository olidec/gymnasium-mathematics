name: Render entire curriculum

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  render-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: pre-release

      - name: Install Typst
        run: |
          TYPST_VERSION=$(curl -s https://api.github.com/repos/typst/typst/releases/latest \
            | jq -r '.tag_name')
          curl -LO "https://github.com/typst/typst/releases/download/${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz"
          tar -xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

      - name: Render entire curriculum
        run: quarto render

      - name: Collect PDFs into dist/
        run: |
          mkdir -p dist
          find _output -name "*.pdf" | while read pdf; do
            rel="${pdf#_output/}"
            dest="dist/$rel"
            mkdir -p "$(dirname "$dest")"
            cp "$pdf" "$dest"
            echo "Copied: $rel"
          done

      - name: Generate index page
        run: python3 .github/scripts/generate-index.py

      - name: List dist contents
        run: find dist -type f | sort

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
