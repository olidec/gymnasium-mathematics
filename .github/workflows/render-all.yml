name: Render entire curriculum

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'   # every Sunday at 04:00 UTC

jobs:
  render-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: pre-release

      - name: Install Typst
        run: |
          TYPST_VERSION=$(curl -s https://api.github.com/repos/typst/typst/releases/latest \
            | jq -r '.tag_name')
          curl -LO "https://github.com/typst/typst/releases/download/${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz"
          tar -xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

      - name: Render entire curriculum
        run: quarto render

      - name: Collect PDFs and build index page
        run: |
          mkdir -p dist

          # Copy all rendered PDFs into dist/, preserving folder structure
          find _output -name "*.pdf" | while read pdf; do
            rel="${pdf#_output/}"
            dest="dist/$rel"
            mkdir -p "$(dirname "$dest")"
            cp "$pdf" "$dest"
            echo "Copied: $rel"
          done

          # Generate index.html linking to all PDFs
          python3 - << 'PYEOF'
import os

topics = [
    ("01-algebra",      "Algebra"),
    ("02-functions",    "Functions"),
    ("03-trigonometry", "Trigonometry & Geometry"),
    ("04-vectors",      "Vectors & Linear Algebra"),
    ("05-calculus",     "Calculus"),
    ("06-statistics",   "Statistics"),
    ("07-probability",  "Probability & Combinatorics"),
    ("08-sequences",    "Sequences & Series"),
    ("09-complex",      "Complex Numbers"),
]

rows = ""
for folder, title in topics:
    lecture   = f"topics/{folder}/lecture.pdf"
    exercises = f"topics/{folder}/exercises.pdf"
    lec_link  = f'<a href="{lecture}">Lecture Notes</a>'  if os.path.exists(f"dist/{lecture}")  else "—"
    ex_link   = f'<a href="{exercises}">Exercises</a>'    if os.path.exists(f"dist/{exercises}") else "—"
    rows += f"    <tr><td>{title}</td><td>{lec_link}</td><td>{ex_link}</td></tr>\n"

html = """<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gymnasium Mathematics</title>
  <style>
    body  { font-family: -apple-system, sans-serif; max-width: 800px;
            margin: 3rem auto; padding: 0 1.5rem; color: #1e293b; }
    h1    { font-size: 1.8rem; border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    th    { text-align: left; padding: 0.6rem 1rem;
            background: #1e3a5f; color: white; }
    td    { padding: 0.6rem 1rem; border-bottom: 1px solid #e2e8f0; }
    tr:hover td { background: #f8fafc; }
    a     { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .meta { color: #64748b; font-size: 0.85rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Gymnasium Mathematics</h1>
  <table>
    <thead>
      <tr><th>Topic</th><th>Lecture Notes</th><th>Exercises</th></tr>
    </thead>
    <tbody>
""" + rows + """    </tbody>
  </table>
  <p class="meta">Generated by GitHub Actions.</p>
</body>
</html>"""

with open("dist/index.html", "w") as f:
    f.write(html)
print("index.html written.")
PYEOF

      - name: List dist contents
        run: find dist -type f | sort

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
